<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-content">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Posts</a>
          <span class="nav-divider">|</span>
          <a href="{{ '/archive' | relative_url }}">Archive</a>
          <span class="nav-divider">|</span>
          <a href="{{ '/tags' | relative_url }}">Tags</a>
          <span class="nav-divider">|</span>
          <a href="{{ '/about' | relative_url }}">About</a>
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <span class="theme-icon">🌙</span>
          </button>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <p>© {{ 'now' | date: "%Y" }} <a href="{{ '/about' | relative_url }}">{{ site.author.name }}</a> · 
        <a href="{{ site.author.linkedin }}">LinkedIn</a> · 
        <a href="{{ site.author.github }}">GitHub</a></p>
      </div>
    </div>
  </footer>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      // Update icon
      const icon = document.querySelector('.theme-icon');
      icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    }
    
    // Load saved theme
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      // Update icon on load
      document.addEventListener('DOMContentLoaded', function() {
        const icon = document.querySelector('.theme-icon');
        if (icon) icon.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
      });
    })();
  </script>
</body>
</html>
