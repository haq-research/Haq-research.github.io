<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
</head>
<body>
  <div class="accent-bar"></div>
  
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/blogs/' | relative_url }}" {% if page.url contains '/blogs' %}class="active"{% endif %}>Blogs</a>
        <a href="{{ '/research/' | relative_url }}" {% if page.url contains '/research' %}class="active"{% endif %}>Research</a>
        <a href="{{ '/tags/' | relative_url }}" {% if page.url == '/tags/' %}class="active"{% endif %}>Tags</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
          <span class="theme-icon">☀️</span>
        </button>
      </nav>
    </div>
  </header>

  <main class="main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      © {{ 'now' | date: "%Y" }} <a href="{{ '/about/' | relative_url }}">{{ site.author.name }}</a> · 
      <a href="https://linkedin.com/in/{{ site.author.linkedin }}">LinkedIn</a> · 
      <a href="https://github.com/{{ site.author.github }}">GitHub</a>
    </div>
  </footer>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.querySelector('.theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
    }
    
    // Load saved theme (default to dark)
    (function() {
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.addEventListener('DOMContentLoaded', function() {
        const icon = document.querySelector('.theme-icon');
        if (icon) icon.textContent = saved === 'dark' ? '☀️' : '🌙';
      });
    })();
  </script>
</body>
</html>
