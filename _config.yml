title: Haq Research
description: AI Systems, Architecture & Research Notes
url: "https://haq-research.github.io"
baseurl: ""

author:
  name: Abdul Haq
  linkedin: https://www.linkedin.com/in/mohammadhaq01/
  github: https://github.com/haq-research

# Build settings
markdown: kramdown
highlighter: rouge

# Permalinks
permalink: /blogs/:title/

# Collections
collections:
  research:
    output: true
    permalink: /research/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      content_type: "blog"
  - scope:
      path: ""
      type: "research"
    values:
      layout: "research"
      content_type: "research"

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
