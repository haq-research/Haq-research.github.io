# Site settings
title: HAQ RESEARCH
name: Abdul Haq
description: AI Systems, Architecture & Research Notes
url: https://haq-research.github.io
baseurl: ""

# Theme
remote_theme: mmistakes/minimal-mistakes@4.24.0
minimal_mistakes_skin: "dark"

# Author
author:
  name: "Abdul Haq"
  bio: "AI Solution Architect & Senior AI Engineer"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/haq-research"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/mohammadhaq01"

# Permalinks
permalink: /:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Include _pages
include:
  - _pages

# Build
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
