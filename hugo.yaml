baseURL: "https://haq-research.github.io/"
languageCode: "en-us"
title: "Abdul HaQ"
theme: "PaperMod"

# Default to dark mode
params:
  defaultTheme: light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowToc: false

  
  # Home page
  homeInfoParams:
    Title: "Welcome to Haq's Research"
    Content: >
      *AI Systems Engineer | Solution Architect | Researcher*
      
      Designing enterprise-scale Generative AI. Specializing in LLM systems, RAG architecture, and production infrastructure. Exploring the intersection of AI, software engineering, and research. Join me on this journey to understand and build the future of AI.

  # Social icons
  socialIcons:
    - name: github
      url: "https://github.com/haq-research"
    - name: linkedin
      url: "https://linkedin.com/in/mohammadhaq01"
    - name: gmail
      url: "mailto:mohammadhaq01@gmail.com"

  # Custom CSS
  customCSS:
    - css/custom.css

# Menu
menu:
  main:
    - name: Blogs
      url: /posts/
      weight: 1
    - name: Research
      url: /research/
      weight: 2
    - name: Tags
      url: /tags/
      weight: 3
    - name: About
      url: /about/
      weight: 4

# Taxonomies
taxonomies:
  tag: tags

# Outputs
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Permalinks
permalinks:
  posts: "/blogs/:title/"
  research: "/research/:title/"
