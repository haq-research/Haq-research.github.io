# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: HAQ RESEARCH
first_name: Abdul
last_name: Haq
email: your-email@example.com
description: >
  AI Systems, Architecture & Research Notes

url: https://haq-research.github.io
baseurl: ""

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

remote_theme: alshedivat/al-folio@v0.12.0

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
search_enabled: false

# Dark mode
color_scheme: dark # "auto" | "dark" | "light"

# Custom CSS
custom_css:
  - /assets/css/custom.css

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: haq-research
linkedin_username: mohammadhaq01

# -----------------------------------------------------------------------------
# Blog settings
# -----------------------------------------------------------------------------

blog_name: Blogs
blog_description: Articles on AI systems, LLM architecture, and engineering insights
permalink: /blogs/:title/

# -----------------------------------------------------------------------------
# Publications (Research)
# -----------------------------------------------------------------------------

publications:
  enabled: true
  title: Research

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    output: false

# -----------------------------------------------------------------------------
# Pagination
# -----------------------------------------------------------------------------

pagination:
  enabled: true
  per_page: 10

# -----------------------------------------------------------------------------
# Build settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-scholar
  - jekyll-remote-theme

# -----------------------------------------------------------------------------
# Jekyll Scholar (for bibliography)
# -----------------------------------------------------------------------------

scholar:
  style: apa
  bibliography: papers.bib
  bibliography_template: bib
  sort_by: year
  order: descending

# -----------------------------------------------------------------------------
# Exclude
# -----------------------------------------------------------------------------

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
